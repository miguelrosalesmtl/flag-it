name: CI

# Runs on every PR into main, and on main itself as a backstop.
#
# The `quality` job is what makes this template's architecture real. Its lint step
# is the only thing standing between the codebase and a component that imports the
# API client — see the boundary matrix in eslint.config.js. Both jobs are required
# checks on main, so a violation cannot merge.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# A new push to a PR makes the previous run pointless — cancel it.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4 # version comes from `packageManager` in package.json

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Architecture enforcement. A component importing api/ or store/, an
      # unclassified source file, or a custom import.meta.env read fails here.
      - name: Lint (includes architectural boundaries)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit and component tests
        run: pnpm test

      - name: Build app
        run: pnpm build

      # The component catalog is part of the product; a broken story is a broken build.
      - name: Build Storybook
        run: pnpm build-storybook

      - name: Check formatting
        run: pnpm exec prettier --check .

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Cache the browser binary; downloading Chromium is most of this job's runtime.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      # The cached binary still needs its system libs on a fresh runner.
      - name: Install system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      # Boots the real dev server (see playwright.config.ts) and drives Chromium:
      # config fetch, Zod validation, MSW startup, render, delete, error + retry.
      - name: End-to-end tests
        run: pnpm test:e2e

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
