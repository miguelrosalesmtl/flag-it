server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;

  # config.json is rewritten per deployment. If a CDN or browser caches it, a
  # promoted container serves the PREVIOUS environment's config. Never cache it.
  #
  # `no-store` only, and no `expires` directive: `expires` emits its own
  # Cache-Control, which would leave two conflicting headers on the response.
  location = /config.json {
    add_header Cache-Control "no-store" always;
    default_type application/json;
  }

  # Hashed asset filenames change on every build, so they are safe to cache hard.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # SPA: every unknown path is a client route, not a 404.
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }
}
