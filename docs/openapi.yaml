info:
  description: Multi-tenant feature-flag service (LaunchDarkly-style, server-side evaluation).
  title: Feature-Flag Platform API
  version: 0.1.0
openapi: 3.1.0
paths:
  /api/v1/auth/login:
    post:
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Exchange credentials for a JWT
      tags:
        - Auth
  /api/v1/eval:
    post:
      description: "Evaluation context. Single-kind: {\"kind\":\"user\",\"key\":\"u1\",\"country\":\"US\"}. Multi-kind: {\"kind\":\"multi\",\"user\":{\"key\":\"u1\"},\"org\":{\"key\":\"o1\"}}. No kind = user."
      operationId: evaluate
      parameters:
        - in: header
          name: X-SDK-Key
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvalSingleInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Evaluation"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - sdkKeyAuth: []
      summary: Evaluate one flag for a context (SDK key auth)
      tags:
        - Evaluation
  /api/v1/eval/all:
    post:
      description: "Evaluation context. Single-kind: {\"kind\":\"user\",\"key\":\"u1\",\"country\":\"US\"}. Multi-kind: {\"kind\":\"multi\",\"user\":{\"key\":\"u1\"},\"org\":{\"key\":\"o1\"}}. No kind = user."
      operationId: evaluate-all
      parameters:
        - in: header
          name: X-SDK-Key
          schema:
            type: string
      requestBody:
        content:
