components:
  schemas:
    AddMemberInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://localhost:8080/schemas/AddMemberInputBody.json
          format: uri
          readOnly: true
          type: string
        email:
          format: email
          type: string
        role:
          description: optional tenant-scoped role key (e.g. tenant_admin)
          type: string
      required:
        - email
      type: object
    AddMemberOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://localhost:8080/schemas/AddMemberOutputBody.json
          format: uri
          readOnly: true
          type: string
