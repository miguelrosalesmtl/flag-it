          $ref: "#/components/schemas/RoleAssignment"
        membership:
          $ref: "#/components/schemas/Membership"
      required:
        - membership
      type: object
    AuditEntry:
      additionalProperties: false
      properties:
        action:
          type: string
        actor_email:
          type: string
        actor_id:
          type: string
        comment:
          type: string
        created_at:
          format: date-time
          type: string
        data: {}
        id:
          type: string
        project_id:
          type: string
        resource_key:
          type: string
        resource_type:
          type: string
        tenant_id:
          type: string
      required:
        - id
        - actor_email
        - action
        - resource_type
        - resource_key
        - created_at
      type: object
    ChangeRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - http://localhost:8080/schemas/ChangeRequest.json
          format: uri
          readOnly: true
          type: string
        comment:
          type: string
        created_at:
          format: date-time
          type: string
        environment_id:
          type: string
        environment_key:
          type: string
        flag_key:
          type: string
        id:
          type: string
        instructions: {}
        project_id:
          type: string
        requested_by:
          type: string
        requested_by_email:
          type: string
        review_comment:
          type: string
        reviewed_at:
          format: date-time
          type: string
        reviewed_by:
          type: string
        reviewed_by_email:
          type: string
        status:
          type: string
      required:
        - id
        - project_id
        - environment_id
        - environment_key
        - flag_key
        - instructions
        - comment
        - status
        - requested_by
        - requested_by_email
        - created_at
      type: object
